apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-dashboard-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-dashboard-role
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-dashboard-binding
subjects:
  - kind: ServiceAccount
    name: devops-dashboard-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: devops-dashboard-role
  apiGroup: rbac.authorization.k8s.io
